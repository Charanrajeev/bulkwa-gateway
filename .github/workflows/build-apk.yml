name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Init React Native project
        run: |
          npx --yes react-native@0.73.4 init BulkWAGateway \
            --version 0.73.4 \
            --skip-install \
            --npm

      - name: Copy app files
        run: |
          cp App.js BulkWAGateway/App.js
          cp package.json BulkWAGateway/package.json
          mkdir -p BulkWAGateway/android/app/src/main/java/com/bulkwagateway
          cp android/app/src/main/java/com/bulkwagateway/SmsModule.java \
             BulkWAGateway/android/app/src/main/java/com/bulkwagateway/SmsModule.java
          cp android/app/src/main/java/com/bulkwagateway/SmsPackage.java \
             BulkWAGateway/android/app/src/main/java/com/bulkwagateway/SmsPackage.java

      - name: Install JS dependencies
        working-directory: BulkWAGateway
        run: npm install

      - name: Patch AndroidManifest.xml
        working-directory: BulkWAGateway
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.SEND_SMS"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>|' $MANIFEST

      - name: Patch MainApplication.java
        working-directory: BulkWAGateway
        run: |
          MAIN_APP=$(find android -name "MainApplication.java" | head -1)
          echo "Found: $MAIN_APP"
          cat $MAIN_APP
          sed -i '/^package com.bulkwagateway;/a import com.bulkwagateway.SmsPackage;' $MAIN_APP
          sed -i '/new PackageList(this).getPackages();/a \            packages.add(new SmsPackage());' $MAIN_APP

      - name: Fix gradle permissions
        working-directory: BulkWAGateway/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: BulkWAGateway/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BulkWA-Gateway-APK
          path: BulkWAGateway/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
